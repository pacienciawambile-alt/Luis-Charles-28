<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Guima Cobra</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

<h1>Guima Cobra</h1>

<!-- MENU -->
<div id="menu">
    <button id="menuBtn">⋮</button>
    <div id="menuContent" class="hidden">
        <p>Máx: <span id="maxScore">0</span></p>
        <p>Mín: <span id="minScore">0</span></p>
        <button id="resetScore">Zerar Pontuação</button>
        <hr>
        <h3>Melhores Jogadores</h3>
        <ul id="bestPlayers"></ul>
    </div>
</div>

<div class="game-container">
    <canvas id="game"></canvas>
</div>

<!-- CONTROLES MOBILE -->
<div id="controls">
    <div class="row">
        <button onclick="setDirection('UP')">⬆️</button>
    </div>
    <div class="row">
        <button onclick="setDirection('LEFT')">⬅️</button>
        <button onclick="setDirection('DOWN')">⬇️</button>
        <button onclick="setDirection('RIGHT')">➡️</button>
    </div>
</div>

<button id="restart">Reiniciar</button>

<p class="score">Pontuação: <span id="score">0</span></p>

<!-- SONS -->
<audio id="eatSound" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>
<audio id="gameOverSound" src="https://www.soundjay.com/button/sounds/button-10.mp3"></audio>

<script>
    // Dados do Python
    const snakeColors = {{ snake_color | safe }};
    const foodColor = "{{ food_color }}";
    const background = "{{ background }}";
    const obstacles = {{ obstacles | safe }};
    const bestScores = {{ best_scores | safe }};

    document.body.style.background = background;

    // Preencher menu com melhores jogadores
    const bestPlayersEl = document.getElementById("bestPlayers");
    bestScores.forEach(p => {
        const li = document.createElement("li");
        li.innerText = `${p.name}: ${p.score}`;
        bestPlayersEl.appendChild(li);
    });
</script>

<script src="index.js"></script>
</body>
</html>
