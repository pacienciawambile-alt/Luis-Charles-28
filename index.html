<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Guima Cobra</title>
    <link rel="stylesheet" href="C.css">
</head>
<body>

<h1>Guima Cobra</h1>

<!-- MENU -->
<div id="menu">
    <button id="menuBtn">⋮</button>
    <div id="menuContent" class="hidden">
        <p>Máx: <span id="maxScore">0</span></p>
        <p>Mín: <span id="minScore">0</span></p>
        <p>Melhor Jogador: <span id="bestPlayer">N/A</span></p>
        <button id="resetScore">Zerar Pontuação</button>
    </div>
</div>

<div class="game-container">
    <canvas id="game"></canvas>
</div>

<!-- CONTROLES MOBILE -->
<div id="controls">
    <div class="row">
        <button onclick="setDirection('UP')">⬆️</button>
    </div>
    <div class="row">
        <button onclick="setDirection('LEFT')">⬅️</button>
        <button onclick="setDirection('DOWN')">⬇️</button>
        <button onclick="setDirection('RIGHT')">➡️</button>
    </div>
</div>

<button id="restart">Reiniciar</button>

<p class="score">Pontuação: <span id="score">0</span></p>

<!-- SONS -->
<audio id="eatSound" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>
<audio id="gameOverSound" src="https://www.soundjay.com/button/sounds/button-10.mp3"></audio>

<script src="j.js"></script>
</body>
</html>
